<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="mediaQueries.css">
    <title>MediaQueries</title>
</head>
<body>
    <div class="contenedor">
        <div class="imagen">
            <img src="img/pizza1.png">
        </div>
        <div class="etiquetas">
            <p>GLUTEN FREE</p>
            <P>MAIN DISH</P>
        </div>
        <div class="titulo">
            <p>Gluten Free Pan Pizza</p>
        </div>
        <div class="stars">
            <img src="img/StarOrange.png">
            <img src="img/StarOrange.png">
            <img src="img/StarOrange.png">
            <img src="img/StarOrange.png">
            <img src="img/Star.png">

        </div>
        <div class="comentario">
            <p>It realli is possible to make excellent gluten free pizza at home
                in you own oven with our recipes and techniques.</p>
        </div>
        <div class="boton">
            <div class="contenidoBoton">
                <img src="img/guardar.png">
                <p class="Save">Save</p>
            </div>
        </div>
    </div>

</html>
